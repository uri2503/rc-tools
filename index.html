<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RC Deploy · Riedel Classics</title>
<style>
  :root {
    --bg: #0d0d0d; --surface: #161616; --surface2: #1e1e1e;
    --border: #2a2a2a; --red: #c0392b; --gold: #d4af37;
    --text: #e8e4dc; --muted: #888; --green: #4caf50;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, 'Inter', sans-serif; font-size: 14px; min-height: 100vh; padding: 0 0 40px; }

  .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 16px 20px; display: flex; align-items: center; gap: 12px; }
  .logo { width: 32px; height: 32px; border: 2px solid var(--red); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 12px; color: var(--red); flex-shrink: 0; }
  .header-text h1 { font-size: 16px; font-weight: 600; }
  .header-text p { font-size: 10px; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; }

  .container { max-width: 500px; margin: 0 auto; padding: 24px 16px; }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 20px; margin-bottom: 16px; }
  .card-label { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--red); font-weight: 600; margin-bottom: 14px; }

  .field { margin-bottom: 12px; }
  .field label { display: block; font-size: 10px; letter-spacing: 0.07em; text-transform: uppercase; color: var(--muted); margin-bottom: 5px; }
  .field input, .field select {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 4px; color: var(--text); padding: 10px 12px;
    font-size: 13px; font-family: inherit; outline: none;
    -webkit-appearance: none; transition: border-color 0.2s;
  }
  .field input:focus, .field select:focus { border-color: var(--red); }
  .field select option { background: var(--surface2); }

  .token-wrap { position: relative; }
  .token-wrap input { padding-right: 44px; font-family: monospace; font-size: 12px; }
  .token-eye { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--muted); cursor: pointer; font-size: 16px; padding: 0; }

  .drop-zone {
    border: 2px dashed var(--border); border-radius: 6px;
    padding: 24px; text-align: center; cursor: pointer;
    transition: border-color 0.2s; position: relative;
  }
  .drop-zone:hover, .drop-zone.active { border-color: var(--red); }
  .drop-zone.has-file { border-color: var(--green); border-style: solid; }
  .drop-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
  .drop-icon { font-size: 28px; margin-bottom: 6px; }
  .drop-text { font-size: 12px; color: var(--muted); }
  .drop-filename { font-size: 13px; font-weight: 600; color: var(--green); margin-top: 4px; }

  .btn-deploy {
    width: 100%; background: var(--red); color: #fff;
    border: none; border-radius: 5px; padding: 14px;
    font-size: 13px; font-weight: 700; letter-spacing: 0.06em;
    text-transform: uppercase; cursor: pointer; transition: background 0.2s;
  }
  .btn-deploy:hover { background: #a93226; }
  .btn-deploy:disabled { background: #444; cursor: not-allowed; }

  /* Log */
  .log { background: #0a0a0a; border: 1px solid var(--border); border-radius: 6px; padding: 14px; font-family: monospace; font-size: 12px; line-height: 1.8; display: none; max-height: 240px; overflow-y: auto; }
  .log.visible { display: block; }
  .log-line { display: flex; gap: 8px; }
  .log-time { color: var(--muted); flex-shrink: 0; }
  .log-msg { }
  .log-ok { color: var(--green); }
  .log-err { color: #ff6b6b; }
  .log-info { color: var(--gold); }

  /* Success */
  .success-box { background: #001a00; border: 1px solid var(--green); border-left: 3px solid var(--green); border-radius: 5px; padding: 16px; display: none; }
  .success-box.visible { display: block; }
  .success-title { font-weight: 700; color: var(--green); margin-bottom: 4px; }
  .success-url { font-size: 12px; color: var(--muted); }
  .success-url a { color: var(--gold); text-decoration: none; }

  /* Saved repos */
  .saved-repos { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
  .repo-chip {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 3px; padding: 3px 8px; font-size: 11px;
    cursor: pointer; transition: border-color 0.2s; color: var(--muted);
  }
  .repo-chip:hover { border-color: var(--red); color: var(--text); }

  .hint { font-size: 11px; color: var(--muted); margin-top: 6px; line-height: 1.5; }
</style>
</head>
<body>

<header class="header">
  <div class="logo">RC</div>
  <div class="header-text">
    <h1>RC Deploy</h1>
    <p>GitHub Pages · Sofort-Deploy</p>
  </div>
</header>

<div class="container">

  <!-- Token -->
  <div class="card">
    <div class="card-label">GitHub Konfiguration</div>

    <div class="field">
      <label>GitHub Token</label>
      <div class="token-wrap">
        <input type="password" id="token" placeholder="ghp_..." autocomplete="off" />
        <button class="token-eye" onclick="toggleToken()">👁</button>
      </div>
      <div class="hint">Einmalig eingeben — wird lokal im Browser gespeichert</div>
    </div>

    <div class="field">
      <label>GitHub Username</label>
      <input type="text" id="ghuser" placeholder="uri2503" value="uri2503" />
    </div>

    <div class="field">
      <label>Repository</label>
      <input type="text" id="repo" placeholder="rc_klassiker" value="rc_klassiker" />
      <div class="saved-repos" id="savedRepos"></div>
    </div>

    <div class="field">
      <label>Ziel-Dateiname auf GitHub</label>
      <input type="text" id="targetfile" placeholder="index.html" value="index.html" />
    </div>

    <div class="field">
      <label>Branch</label>
      <input type="text" id="branch" placeholder="main" value="main" />
    </div>
  </div>

  <!-- Datei -->
  <div class="card">
    <div class="card-label">Datei auswählen</div>
    <div class="drop-zone" id="dropZone">
      <input type="file" id="fileInput" onchange="fileSelected(this)" />
      <div class="drop-icon">📄</div>
      <div class="drop-text">index.html auswählen</div>
      <div class="drop-filename" id="fileName"></div>
    </div>
    <div class="hint" style="margin-top:8px;">Direkt aus Dateien-App oder Downloads wählen</div>
  </div>

  <!-- Deploy Button -->
  <button class="btn-deploy" id="deployBtn" onclick="deploy()" disabled>
    🚀 Zu GitHub deployen
  </button>

  <!-- Log -->
  <div style="margin-top:16px;">
    <div class="log" id="log"></div>
    <div class="success-box" id="successBox">
      <div class="success-title">✅ Erfolgreich deployed!</div>
      <div class="success-url" id="successUrl"></div>
      <div class="hint" style="margin-top:6px;">GitHub Pages aktualisiert sich in ~30 Sekunden.</div>
    </div>
  </div>

</div>

<script>
var fileContent = null;
var fileName    = null;

// Repos dynamisch von GitHub laden
var knownRepos = [];

function loadRepos() {
  var token  = document.getElementById('token').value.trim();
  var ghuser = document.getElementById('ghuser').value.trim();
  if (!token || !ghuser) return;

  fetch('https://api.github.com/users/' + ghuser + '/repos?per_page=100&sort=updated', {
    headers: { 'Authorization': 'token ' + token, 'Accept': 'application/vnd.github.v3+json' }
  })
  .then(function(r) { return r.json(); })
  .then(function(repos) {
    if (!Array.isArray(repos)) return;
    knownRepos = repos.map(function(r) { return r.name; });
    renderRepoChips();
  })
  .catch(function() {});
}

// Gespeicherte Werte laden
window.onload = function() {
  var t = localStorage.getItem('rc_gh_token');
  var u = localStorage.getItem('rc_gh_user');
  if (t) document.getElementById('token').value  = t;
  if (u) document.getElementById('ghuser').value = u;
  // Repos sofort laden wenn Token vorhanden
  if (t && u) loadRepos();
  // Bei Token/User Änderung neu laden
  document.getElementById('token').addEventListener('blur', loadRepos);
  document.getElementById('ghuser').addEventListener('blur', loadRepos);
};

function renderRepoChips() {
  var el = document.getElementById('savedRepos');
  el.innerHTML = '';
  knownRepos.forEach(function(r) {
    el.innerHTML += '<span class="repo-chip" onclick="setRepo(\'' + r + '\')">' + r + '</span>';
  });
}

function setRepo(r) {
  document.getElementById('repo').value = r;
}

function toggleToken() {
  var inp = document.getElementById('token');
  inp.type = inp.type === 'password' ? 'text' : 'password';
}

function fileSelected(input) {
  var file = input.files[0];
  if (!file) return;
  fileName = file.name;
  document.getElementById('fileName').textContent = '✓ ' + file.name + ' (' + Math.round(file.size/1024) + ' KB)';
  document.getElementById('dropZone').classList.add('has-file');

  var reader = new FileReader();
  reader.onload = function(e) {
    fileContent = e.target.result;
    document.getElementById('deployBtn').disabled = false;
  };
  reader.readAsText(file, 'UTF-8');
}

function log(msg, type) {
  var el = document.getElementById('log');
  el.classList.add('visible');
  var now = new Date();
  var time = String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0') + ':' + String(now.getSeconds()).padStart(2,'0');
  var cls  = type === 'ok' ? 'log-ok' : type === 'err' ? 'log-err' : 'log-info';
  el.innerHTML += '<div class="log-line"><span class="log-time">' + time + '</span><span class="log-msg ' + cls + '">' + msg + '</span></div>';
  el.scrollTop = el.scrollHeight;
}

function deploy() {
  var token    = document.getElementById('token').value.trim();
  var ghuser   = document.getElementById('ghuser').value.trim();
  var repo     = document.getElementById('repo').value.trim();
  var target   = document.getElementById('targetfile').value.trim() || 'index.html';
  var branch   = document.getElementById('branch').value.trim() || 'main';

  if (!token)       { alert('Bitte GitHub Token eingeben.'); return; }
  if (!ghuser)      { alert('Bitte GitHub Username eingeben.'); return; }
  if (!repo)        { alert('Bitte Repository eingeben.'); return; }
  if (!fileContent) { alert('Bitte zuerst eine Datei auswählen.'); return; }

  // Speichern für nächstes Mal
  localStorage.setItem('rc_gh_token', token);
  localStorage.setItem('rc_gh_user', ghuser);

  var btn = document.getElementById('deployBtn');
  btn.disabled = true;
  btn.textContent = '⏳ Deploying…';
  document.getElementById('successBox').classList.remove('visible');

  var apiUrl = 'https://api.github.com/repos/' + ghuser + '/' + repo + '/contents/' + target;
  var headers = {
    'Authorization': 'token ' + token,
    'Accept': 'application/vnd.github.v3+json',
    'Content-Type': 'application/json'
  };

  log('Verbinde mit GitHub API…', 'info');
  log('Repo: ' + ghuser + '/' + repo + ' → ' + target, 'info');

  // Schritt 1: Aktuellen SHA holen
  fetch(apiUrl + '?ref=' + branch, { headers: headers })
  .then(function(r) {
    if (r.status === 404) return null; // Datei neu
    if (!r.ok) throw new Error('GitHub API Fehler: ' + r.status);
    return r.json();
  })
  .then(function(existing) {
    var sha = existing ? existing.sha : null;
    if (sha) {
      log('Bestehende Datei gefunden — wird aktualisiert.', 'info');
    } else {
      log('Neue Datei wird erstellt.', 'info');
    }

    // Base64 kodieren
    var b64 = btoa(unescape(encodeURIComponent(fileContent)));

    var now = new Date();
    var ts  = now.toISOString().substring(0,16).replace('T',' ');
    var payload = {
      message: 'Deploy ' + target + ' — ' + ts,
      content: b64,
      branch:  branch
    };
    if (sha) payload.sha = sha;

    log('Lade ' + target + ' hoch…', 'info');

    return fetch(apiUrl, {
      method:  'PUT',
      headers: headers,
      body:    JSON.stringify(payload)
    });
  })
  .then(function(r) {
    if (!r.ok) return r.json().then(function(e) { throw new Error(e.message || 'Deploy fehlgeschlagen'); });
    return r.json();
  })
  .then(function(data) {
    var commitUrl = data.commit ? data.commit.html_url : '';
    log('✅ Deploy erfolgreich!', 'ok');
    if (commitUrl) log('Commit: ' + commitUrl, 'ok');

    var pageUrl = 'https://' + ghuser + '.github.io/' + repo + '/';
    document.getElementById('successUrl').innerHTML =
      '🌐 <a href="' + pageUrl + '" target="_blank">' + pageUrl + '</a>';
    document.getElementById('successBox').classList.add('visible');

    btn.textContent = '✅ Deployed!';
    setTimeout(function() {
      btn.textContent = '🚀 Zu GitHub deployen';
      btn.disabled = false;
    }, 3000);
  })
  .catch(function(err) {
    log('❌ Fehler: ' + err.message, 'err');
    btn.textContent = '🚀 Zu GitHub deployen';
    btn.disabled = false;
  });
}
</script>
</body>
</html>
