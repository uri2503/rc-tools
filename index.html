<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>RC Dev Dashboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{max-width:100%;overflow-x:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif;background:#0d0d0d;color:#e8e8e8;min-height:100vh;width:100%}
header{background:#141414;border-bottom:1px solid #2a2a2a;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.logo{display:flex;align-items:center;gap:10px}
.logo-mark{width:36px;height:36px;background:#c0392b;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:#fff;flex-shrink:0}
.logo-text{font-size:13px;font-weight:600;letter-spacing:.06em}
.logo-sub{font-size:10px;color:#888;margin-top:1px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:7px;border:none;font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;transition:background .15s}
.btn-red{background:#c0392b;color:#fff}.btn-red:hover{background:#a93226}
.btn-gray{background:#1f1f1f;color:#aaa;border:1px solid #2a2a2a}.btn-gray:hover{color:#e8e8e8}
.stats{display:flex;border-bottom:1px solid #2a2a2a;overflow-x:auto}
.stat{padding:14px 24px;border-right:1px solid #2a2a2a;flex-shrink:0}
.stat-n{font-size:24px;font-weight:700;color:#c0392b}
.stat-l{font-size:11px;color:#666;text-transform:uppercase;letter-spacing:.06em;margin-top:2px}
.toolbar{display:flex;align-items:center;gap:8px;padding:12px 20px;border-bottom:1px solid #2a2a2a;flex-wrap:wrap}
.fb{padding:5px 14px;border-radius:20px;border:1px solid #2a2a2a;background:transparent;color:#888;font-size:12px;cursor:pointer;font-family:inherit}
.fb.on{background:#c0392b;color:#fff;border-color:#c0392b}
.search{margin-left:auto;background:#1a1a1a;border:1px solid #2a2a2a;color:#e8e8e8;padding:6px 12px;border-radius:7px;font-family:inherit;font-size:13px;width:160px;outline:none}
.search:focus{border-color:#c0392b}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;padding:20px;width:100%;max-width:100%}
.card{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:10px;overflow:hidden;display:flex;flex-direction:column;min-width:0}
.card-top{padding:14px 16px 12px;border-bottom:1px solid #2a2a2a;display:flex;align-items:flex-start;gap:10px}
.card-icon{width:36px;height:36px;background:rgba(192,57,43,.15);border:1px solid rgba(192,57,43,.3);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.card-name{font-size:14px;font-weight:600;line-height:1.3}
.card-tags{font-size:11px;color:#666;margin-top:2px}
.badge{padding:3px 9px;border-radius:20px;font-size:11px;font-weight:500;white-space:nowrap;flex-shrink:0}
.s-live{background:rgba(39,174,96,.12);color:#27ae60}
.s-dev{background:rgba(243,156,18,.12);color:#f39c12}
.s-idee{background:rgba(136,136,136,.12);color:#888}
.s-archiv{background:rgba(41,128,185,.12);color:#2980b9}
.card-body{padding:12px 16px;flex:1}
.card-desc{font-size:12px;color:#888;line-height:1.6}
.pbar-row{display:flex;align-items:center;gap:8px;margin-top:12px}
.pbar{flex:1;height:4px;background:#2a2a2a;border-radius:2px;overflow:hidden}
.pfill{height:100%;background:#c0392b;border-radius:2px}
.ppct{font-size:11px;color:#c0392b;font-weight:600;min-width:30px;text-align:right}
/* meta pills on card */
.meta-pills{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}
.mpill{font-size:10px;padding:2px 7px;border-radius:12px;border:1px solid #333;color:#777}
.mpill.ziel{border-color:#2a4a3a;color:#5a9;background:rgba(90,170,120,.07)}
.mpill.fuer{border-color:#3a3a2a;color:#aa9;background:rgba(170,160,90,.07)}
.mpill.vtb{border-color:#2a3a4a;color:#79a;background:rgba(100,140,180,.07)}
.reqs{margin-top:12px}
.reqs-title{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:#666;margin-bottom:6px}
.req-item{font-size:12px;color:#aaa;padding:2px 0;display:flex;gap:6px;line-height:1.4}
.req-item::before{content:'›';color:#c0392b;flex-shrink:0}
.cl-last{margin-top:10px;border-top:1px solid #222;padding-top:10px;font-size:11px;color:#666;line-height:1.5}
.cl-date{color:#c0392b;font-weight:500}
.card-foot{padding:10px 16px;border-top:1px solid #2a2a2a;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.card-link{font-size:12px;color:#c0392b;text-decoration:none}.card-link:hover{text-decoration:underline}
.card-link.muted{color:#666}
.foot-btns{margin-left:auto;display:flex;gap:6px}
.btn-sm{padding:4px 10px;border-radius:6px;border:1px solid #2a2a2a;background:transparent;color:#aaa;font-size:12px;cursor:pointer;font-family:inherit}
.btn-sm:hover{color:#e8e8e8;border-color:#444}
.empty{grid-column:1/-1;text-align:center;padding:60px 20px;color:#666}
.empty p{margin-bottom:16px;font-size:14px}
/* OVERLAY */
.ov{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.8);display:none;align-items:center;justify-content:center;padding:16px}
.ov.open{display:flex}
.modal{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:12px;width:100%;max-width:560px;max-height:92vh;overflow-y:auto}
.mhead{padding:16px 20px 14px;border-bottom:1px solid #2a2a2a;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#1a1a1a;z-index:1}
.mhead h2{font-size:15px;font-weight:600}
.mclose{background:none;border:none;color:#888;font-size:22px;cursor:pointer;line-height:1;padding:0}
.mbody{padding:16px 20px}
.mfoot{padding:14px 20px;border-top:1px solid #2a2a2a;display:flex;gap:8px;justify-content:flex-end}
.frow{margin-bottom:14px}
.frow label{display:block;font-size:11px;color:#888;margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em}
.frow input,.frow textarea,.frow select{width:100%;background:#0d0d0d;border:1px solid #2a2a2a;color:#e8e8e8;padding:8px 11px;border-radius:7px;font-family:inherit;font-size:13px;outline:none;resize:vertical}
.frow input:focus,.frow textarea:focus,.frow select:focus{border-color:#c0392b}
.frow select option{background:#1a1a1a}
.f2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.range-row{display:flex;align-items:center;gap:10px}
.range-row input[type=range]{flex:1;accent-color:#c0392b}
.range-v{font-size:13px;color:#c0392b;font-weight:600;min-width:36px;text-align:right}
.tag-list{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:6px}
.tag{background:rgba(192,57,43,.12);border:1px solid rgba(192,57,43,.25);color:#ccc;font-size:11px;padding:3px 9px;border-radius:20px;display:flex;align-items:center;gap:4px}
.tag-x{cursor:pointer;color:#888;font-size:14px;line-height:1}.tag-x:hover{color:#c0392b}
/* Checkbox multi-select */
.cb-grid{display:flex;flex-wrap:wrap;gap:6px}
.cb-item{display:flex;align-items:center;gap:5px;cursor:pointer}
.cb-item input[type=checkbox]{accent-color:#c0392b;width:14px;height:14px;cursor:pointer;flex-shrink:0}
.cb-item span{font-size:12px;color:#ccc}
.cb-item input:checked + span{color:#e8e8e8}
.cb-add-row{display:flex;gap:6px;margin-top:8px}
.cb-add-row input{flex:1;background:#0d0d0d;border:1px solid #2a2a2a;color:#e8e8e8;padding:6px 10px;border-radius:6px;font-family:inherit;font-size:12px;outline:none}
.cb-add-row input:focus{border-color:#c0392b}
.cb-rm{background:none;border:none;color:#555;cursor:pointer;font-size:13px;padding:0 2px;line-height:1}.cb-rm:hover{color:#c0392b}
/* Stammdaten modal */
.sm-section{margin-bottom:20px}
.sm-section h3{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:#888;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid #222}
.sm-item{display:flex;align-items:center;justify-content:space-between;padding:5px 0;font-size:13px;color:#ccc;border-bottom:1px solid #1f1f1f}
/* DETAIL */
.dsec{margin-bottom:20px}
.dsec h3{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:#666;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid #222}
.dreq{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;font-size:12px;padding:4px 0;color:#aaa}
.dreq-txt{display:flex;gap:6px;flex:1}.dreq-txt::before{content:'›';color:#c0392b;flex-shrink:0}
.btn-done{padding:2px 8px;border-radius:5px;border:1px solid #333;background:transparent;color:#666;font-size:11px;cursor:pointer;font-family:inherit}
.btn-done:hover{color:#27ae60;border-color:#27ae60}
.add-row{display:flex;gap:8px;margin-top:8px}
.add-row input{flex:1;background:#0d0d0d;border:1px solid #2a2a2a;color:#e8e8e8;padding:7px 10px;border-radius:7px;font-family:inherit;font-size:12px;outline:none}
.add-row input:focus{border-color:#c0392b}
.cl-entry{display:flex;gap:8px;padding:3px 0;font-size:12px}
.cl-d{color:#c0392b;font-weight:500;flex-shrink:0;font-size:11px}
.cl-t{color:#aaa;line-height:1.5}
.btn-del{background:transparent;border:1px solid #4a1a16;color:#c0392b;padding:5px 10px;border-radius:6px;font-size:12px;cursor:pointer;font-family:inherit}
.btn-del:hover{background:rgba(192,57,43,.1)}
.log-entry{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:7px 0;border-bottom:1px solid #1f1f1f;cursor:pointer}
.log-entry:hover .log-title{color:#c0392b}
.log-meta{display:flex;flex-direction:column;gap:1px;min-width:0}
.log-title{font-size:12px;color:#ccc;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.log-date{font-size:10px;color:#666}
.log-arrow{color:#555;font-size:14px;flex-shrink:0}
.md-view{font-size:13px;color:#ccc;line-height:1.7}
.md-view h1,.md-view h2,.md-view h3{color:#e8e8e8;margin:14px 0 6px;font-weight:600}
.md-view h1{font-size:17px}.md-view h2{font-size:15px}.md-view h3{font-size:13px}
.md-view p{margin:8px 0}
.md-view ul{margin:6px 0 6px 18px}
.md-view li{margin:3px 0}
.md-view strong{color:#fff}
.md-view code{background:#0d0d0d;border:1px solid #2a2a2a;padding:1px 5px;border-radius:4px;font-size:12px}
.log-back{background:none;border:none;color:#888;font-size:12px;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:4px;margin-bottom:14px}
.log-back:hover{color:#c0392b}
.toast{position:fixed;bottom:20px;right:20px;z-index:999;background:#1a1a1a;border:1px solid #2a2a2a;color:#e8e8e8;padding:10px 16px;border-radius:8px;font-size:13px;opacity:0;pointer-events:none;transition:opacity .3s;box-shadow:0 4px 20px rgba(0,0,0,.5)}
.toast.show{opacity:1}.toast.ok{border-left:3px solid #27ae60}.toast.err{border-left:3px solid #c0392b}
@media(max-width:600px){.grid{padding:12px}.f2{grid-template-columns:1fr}}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-mark">RC</div>
    <div>
      <div class="logo-text">DEV DASHBOARD</div>
      <div class="logo-sub">...mit Liebe zum Detail</div>
    </div>
  </div>
  <div style="display:flex;gap:8px;flex-wrap:wrap">
    <button class="btn btn-gray" onclick="openStammdaten()">⚙ Stammdaten</button>
    <button class="btn btn-gray" onclick="doExport()">↓ Export</button>
    <button class="btn btn-gray" onclick="doImport()">↑ Import</button>
    <button class="btn btn-red" onclick="openNew()">+ Neues Projekt</button>
  </div>
</header>

<div class="stats">
  <div class="stat"><div class="stat-n" id="sTotal">0</div><div class="stat-l">Gesamt</div></div>
  <div class="stat"><div class="stat-n" id="sLive">0</div><div class="stat-l">Live</div></div>
  <div class="stat"><div class="stat-n" id="sDev">0</div><div class="stat-l">In Entwicklung</div></div>
  <div class="stat"><div class="stat-n" id="sReq">0</div><div class="stat-l">Offene Anforderungen</div></div>
</div>

<div class="toolbar">
  <button class="fb on" onclick="setF('alle',this)">Alle</button>
  <button class="fb" onclick="setF('live',this)">Live</button>
  <button class="fb" onclick="setF('dev',this)">In Entwicklung</button>
  <button class="fb" onclick="setF('idee',this)">Idee</button>
  <button class="fb" onclick="setF('archiv',this)">Archiv</button>
  <input class="search" type="text" id="qSearch" placeholder="Suchen…" oninput="render()">
</div>

<div class="grid" id="grid"></div>
<div class="toast" id="toast"></div>

<!-- FORM MODAL -->
<div class="ov" id="ovForm" onclick="bgClose('ovForm',event)">
  <div class="modal">
    <div class="mhead"><h2 id="fTitle">Neues Projekt</h2><button class="mclose" onclick="closeForm()">×</button></div>
    <div class="mbody">
      <div class="f2">
        <div class="frow"><label>Name *</label><input id="fName" type="text" placeholder="RC_MeinTool"></div>
        <div class="frow"><label>Icon</label><input id="fIcon" type="text" placeholder="🔧" maxlength="4"></div>
      </div>
      <div class="frow"><label>Beschreibung</label><textarea id="fDesc" rows="2" placeholder="Was macht das Tool?"></textarea></div>
      <div class="f2">
        <div class="frow"><label>Status</label>
          <select id="fStatus">
            <option value="idee">💡 Idee</option>
            <option value="dev" selected>🔧 In Entwicklung</option>
            <option value="live">✅ Live</option>
            <option value="archiv">📦 Archiv</option>
          </select>
        </div>
        <div class="frow"><label>Fortschritt</label>
          <div class="range-row">
            <input type="range" id="fProg" min="0" max="100" value="0" oninput="document.getElementById('fProgV').textContent=this.value+'%'">
            <span class="range-v" id="fProgV">0%</span>
          </div>
        </div>
      </div>
      <div class="frow"><label>Live-URL</label><input id="fUrl" type="text" placeholder="https://uri2503.github.io/…"></div>
      <div class="frow"><label>Repo-URL</label><input id="fRepo" type="text" placeholder="https://github.com/uri2503/…"></div>
      <div class="frow"><label>Entwicklungsstart</label><input id="fCreated" type="date"></div>

      <!-- FÜR WEN -->
      <div class="frow">
        <label>Für wen <span style="color:#555;font-size:10px;text-transform:none">(Mehrfachauswahl)</span></label>
        <div class="cb-grid" id="cbFuer"></div>
      </div>

      <!-- ZIELGRUPPE -->
      <div class="frow">
        <label>Zielgruppe <span style="color:#555;font-size:10px;text-transform:none">(Mehrfachauswahl)</span></label>
        <div class="cb-grid" id="cbZiel"></div>
      </div>

      <!-- VERTRIEBSMODELL -->
      <div class="frow">
        <label>Vertriebsmodell <span style="color:#555;font-size:10px;text-transform:none">(Mehrfachauswahl)</span></label>
        <div class="cb-grid" id="cbVtb"></div>
      </div>

      <!-- TECH TAGS -->
      <div class="frow"><label>Tech-Tags <span style="color:#555;font-size:10px;text-transform:none">(Enter)</span></label>
        <div class="tag-list" id="fTagList"></div>
        <input id="fTagIn" type="text" placeholder="Tag eingeben + Enter" onkeydown="addTag(event)">
      </div>
    </div>
    <div class="mfoot">
      <button class="btn btn-gray" onclick="closeForm()">Abbrechen</button>
      <button class="btn btn-red" onclick="saveForm()">Speichern</button>
    </div>
  </div>
</div>

<!-- DETAIL MODAL -->
<div class="ov" id="ovDetail" onclick="bgClose('ovDetail',event)">
  <div class="modal" style="max-width:600px">
    <div class="mhead"><h2 id="dTitle">Details</h2><button class="mclose" onclick="closeDetail()">×</button></div>
    <div class="mbody" id="dBody"></div>
    <div class="mfoot">
      <button class="btn-del" onclick="delProject()">Löschen</button>
      <div style="flex:1"></div>
      <button class="btn btn-gray" onclick="closeDetail()">Schließen</button>
      <button class="btn btn-red" onclick="editFromDetail()">✏ Bearbeiten</button>
    </div>
  </div>
</div>

<!-- STAMMDATEN MODAL -->
<div class="ov" id="ovStamm" onclick="bgClose('ovStamm',event)">
  <div class="modal" style="max-width:500px">
    <div class="mhead"><h2>⚙ Stammdaten</h2><button class="mclose" onclick="closeStammdaten()">×</button></div>
    <div class="mbody" id="stammBody"></div>
    <div class="mfoot"><button class="btn btn-gray" onclick="closeStammdaten()">Schließen</button></div>
  </div>
</div>

<!-- LOG ADD MODAL -->
<div class="ov" id="ovLogAdd" onclick="bgClose('ovLogAdd',event)">
  <div class="modal" style="max-width:600px">
    <div class="mhead"><h2>📄 Neuer Log-Eintrag</h2><button class="mclose" onclick="closeLogAdd()">×</button></div>
    <div class="mbody">
      <div class="frow"><label>Titel</label><input id="logTitle" type="text" placeholder="z.B. Stripe-Integration + Architektur-Refactor"></div>
      <div class="frow"><label>Datum</label><input id="logDate" type="date"></div>
      <div class="frow"><label>Inhalt <span style="color:#555;font-size:10px;text-transform:none">(Markdown wird unterstützt: # Überschrift, **fett**, - Liste)</span></label>
        <textarea id="logContent" rows="14" placeholder="Zusammenfassung hier einfügen…" style="font-family:ui-monospace,monospace;font-size:12px"></textarea>
      </div>
    </div>
    <div class="mfoot">
      <button class="btn btn-gray" onclick="closeLogAdd()">Abbrechen</button>
      <button class="btn btn-red" onclick="saveLog()">Speichern</button>
    </div>
  </div>
</div>

<!-- LOG VIEW MODAL -->
<div class="ov" id="ovLogView" onclick="bgClose('ovLogView',event)">
  <div class="modal" style="max-width:680px">
    <div class="mhead"><h2 id="logViewTitle">Log</h2><button class="mclose" onclick="closeLogView()">×</button></div>
    <div class="mbody">
      <button class="log-back" onclick="closeLogView();openDetail(detailId)">← Zurück zum Projekt</button>
      <div id="logViewDate" style="font-size:11px;color:#666;margin-bottom:14px"></div>
      <div class="md-view" id="logViewBody"></div>
    </div>
    <div class="mfoot">
      <button class="btn-del" onclick="delLog()">Löschen</button>
      <div style="flex:1"></div>
      <button class="btn btn-gray" onclick="closeLogView()">Schließen</button>
    </div>
  </div>
</div>

<script>
var KEY      = 'rcdash1';
var KEY_STAMM = 'rcdash_stamm';
var projects = [];
var filter   = 'alle';
var editId   = null;
var detailId = null;
var formTags = [];
var selFuer  = [];
var selZiel  = [];
var selVtb   = [];

/* ── STAMMDATEN ─────────────────────────────────────────────────────── */
var defaultStamm = {
  fuer: ['Intern / Eigener Gebrauch','Endkunde','Gewerblich','Partner','Sonstige'],
  ziel: ['KFZ-Werkstatt (FWS)','Lackierbetrieb','Oldtimer-Club','Prüfstelle / TÜV','Innung','Händler','Privatperson','Versicherung','Sonstige'],
  vtb:  ['Kostenlos (Free)','Einmalzahlung','Freemium','SaaS / Abo','Intern / Kein Vertrieb','Lizenz','Sonstige']
};

var stamm = {fuer:[], ziel:[], vtb:[]};

function lsGet(k)  { try { return localStorage.getItem(k); }   catch(e) { return null; } }
function lsSet(k,v){ try { localStorage.setItem(k,v); }        catch(e) {} }

function loadStamm() {
  var raw = lsGet(KEY_STAMM);
  if (raw) { try { var s = JSON.parse(raw); if (s && s.fuer) { stamm = s; return; } } catch(e) {} }
  stamm = { fuer: defaultStamm.fuer.slice(), ziel: defaultStamm.ziel.slice(), vtb: defaultStamm.vtb.slice() };
  saveStamm();
}
function saveStamm() { lsSet(KEY_STAMM, JSON.stringify(stamm)); }

/* ── PROJECTS ───────────────────────────────────────────────────────── */
function mkid() { return 'p' + Date.now() + Math.floor(Math.random()*9999); }

function defaults() {
  var d = new Date().toISOString();
  return [
    {id:'p001',name:'RC_Unfallkalkulation',icon:'🚗',
     desc:'KI-gestütztes Schadenskalkulationstool mit Claude Vision API. Ersetzt Audatex/Autodata für kleinere Lackier- und Karosseriebetriebe.',
     status:'live',progress:90,url:'https://uri2503.github.io/RC_unfallkalkulation_demo',
     repo:'https://github.com/uri2503/RC_unfallkalkulation_demo',
     tags:['HTML','Vanilla JS','Supabase','Claude Vision'],
     fuer:['Gewerblich'],ziel:['KFZ-Werkstatt (FWS)','Lackierbetrieb'],vtb:['SaaS / Abo'],
     requirements:['White-Label für Lackhersteller','Fahrzeugseiten-Erkennung verbessern'],
     changelog:[{date:'2025-06',text:'KV PDF-Export + 8-stufiger Workflow'}],created:d},

/* ── HELPERS ────────────────────────────────────────────────────────── */
function daysLabel(iso) {
  if (!iso) return '';
  var d = Math.floor((new Date() - new Date(iso)) / 86400000);
  if (d===0) return 'Heute gestartet';
  if (d===1) return 'Seit gestern';
  if (d<7)   return 'Seit ' + d + ' Tagen';
  var w = Math.floor(d/7);
  if (w<5)   return 'Seit ' + w + (w===1?' Woche':' Wochen');
  return 'Seit ' + Math.floor(d/30) + ' Monaten';
}
function statusLabel(s) {
  if (s==='live')   return '✅ Live';
  if (s==='dev')    return '🔧 In Entwicklung';
  if (s==='idee')   return '💡 Idee';
  if (s==='archiv') return '📦 Archiv';
  return s;
}

/* ── LOGS ───────────────────────────────────────────────────────────── */
var logViewIdx = null;
function escHtml(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function mdToHtml(md){
  var lines=(md||'').replace(/\r\n/g,'\n').split('\n');
  var html='', inList=false, para=[];
  function flushPara(){ if(para.length){ html+='<p>'+inline(para.join(' '))+'</p>'; para=[]; } }
  function inline(t){
    t=escHtml(t);
    t=t.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
    t=t.replace(/`(.+?)`/g,'<code>$1</code>');
    t=t.replace(/\*(.+?)\*/g,'<em>$1</em>');
    return t;
  }
  for(var i=0;i<lines.length;i++){
    var l=lines[i];
    var h=l.match(/^(#{1,3})\s+(.*)/);
    if(h){
      flushPara(); if(inList){html+='</ul>';inList=false;}
      var lvl=h[1].length; html+='<h'+lvl+'>'+inline(h[2])+'</h'+lvl+'>'; continue;
    }
    var li=l.match(/^[-*]\s+(.*)/);
    if(li){
      flushPara(); if(!inList){html+='<ul>';inList=true;}
      html+='<li>'+inline(li[1])+'</li>'; continue;
    }
    if(l.trim()===''){ flushPara(); if(inList){html+='</ul>';inList=false;} continue; }
    para.push(l.trim());
  }
  flushPara(); if(inList) html+='</ul>';
  return html || '<p style="color:#666">Kein Inhalt.</p>';
}

    projects[i].logs.push(entry);

  }

  var p=null; for(var k=0;k<projects.length;k++) if(projects[k].id===detailId){p=projects[k];break;}

function closeStammdaten() { document.getElementById('ovStamm').classList.remove('open'); }

function renderStammBody() {
  var cats = [{key:'fuer',label:'Für wen'},{key:'ziel',label:'Zielgruppe'},{key:'vtb',label:'Vertriebsmodell'}];
  var h='';
  for(var c=0;c<cats.length;c++){
    var key=cats[c].key, lbl=cats[c].label;
    h+='<div class="sm-section"><h3>'+lbl+'</h3>';
    for(var i=0;i<stamm[key].length;i++){
      h+='<div class="sm-item"><span>'+stamm[key][i]+'</span><button class="cb-rm" onclick="stammDel(\''+key+'\','+i+')">✕</button></div>';
    }
    h+='<div class="cb-add-row"><input id="stammIn_'+key+'" type="text" placeholder="Neu hinzufügen…" onkeydown="if(event.key===\'Enter\')stammAdd(\''+key+'\')"><button class="btn-sm" onclick="stammAdd(\''+key+'\')">+ Hinzufügen</button></div>';
    h+='</div>';
  }
  document.getElementById('stammBody').innerHTML=h;
}
function stammAdd(key) {
  var el=document.getElementById('stammIn_'+key);
  var v=el.value.trim(); if(!v) return;
  if(stamm[key].indexOf(v)<0) stamm[key].push(v);
  saveStamm(); el.value=''; renderStammBody();
  toast('Hinzugefügt ✓','ok');
}
function stammDel(key,i) {
  stamm[key].splice(i,1); saveStamm(); renderStammBody();
}

/* ── EXPORT / IMPORT ────────────────────────────────────────────────── */
function doExport() {
  var blob=new Blob([JSON.stringify({projects:projects,stamm:stamm},null,2)],{type:'application/json'});
  var a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='rc_dashboard.json'; a.click();
  toast('Export erfolgreich ✓','ok');
}
function doImport() {
  var inp=document.createElement('input'); inp.type='file'; inp.accept='.json';
  inp.onchange=function(e){
    var f=e.target.files[0]; if(!f) return;
    var r=new FileReader();
    r.onload=function(ev){
      try{
        var d=JSON.parse(ev.target.result);
        if(d.projects&&Array.isArray(d.projects)){projects=d.projects;}
        else if(Array.isArray(d)){projects=d;}
        else throw new Error();
        if(d.stamm) stamm=d.stamm;
        save(); saveStamm(); render(); toast('Import erfolgreich ✓','ok');
      }catch(e){toast('Ungültige Datei.','err');}
    };
    r.readAsText(f);
  };
  inp.click();
}

/* ── TOAST ──────────────────────────────────────────────────────────── */
function toast(msg,type){
  var t=document.getElementById('toast'); t.textContent=msg;
  t.className='toast show '+(type||'ok');
  clearTimeout(t._t); t._t=setTimeout(function(){t.classList.remove('show');},2600);
}

/* ── INIT ───────────────────────────────────────────────────────────── */
function init(){ loadStamm(); load(); render(); }
if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',init);
else init();
</script>
